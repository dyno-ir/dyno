# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  LLVM_VER: 20
  # Configure ccache environment variables
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Clang ${{ env.LLVM_VER }}, libc++, and ccache
      run: |
        # Download the official LLVM repo setup script
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        # Install Clang, then manually install the matching libc++ headers and ccache
        sudo ./llvm.sh ${{ env.LLVM_VER }}
        sudo apt-get install -y libc++-${{ env.LLVM_VER }}-dev libc++abi-${{ env.LLVM_VER }}-dev ccache

    - name: Restore ccache
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: Configure ccache
      run: |
        mkdir -p ${{ env.CCACHE_DIR }}
        ccache --set-config=max_size=1G
        ccache -z

    - name: Get submodules
      run : git submodule update --init --recursive

    - name: Configure CMake
      env:
        CC: clang-${{ env.LLVM_VER }}
        CXX: clang++-${{ env.LLVM_VER }}
        CXXFLAGS: -stdlib=libc++
        LDFLAGS: -stdlib=libc++
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_C_COMPILER=clang-${{ env.LLVM_VER }}
        -DCMAKE_CXX_COMPILER=clang++-${{ env.LLVM_VER }}
        -DCMAKE_CXX_FLAGS="-stdlib=libc++"
        -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j $(nproc)

    - name: Save ccache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ runner.os }}-${{ github.run_id }}

    - name: Show ccache stats
      if: always()
      run: ccache -s

    - name: Test
      working-directory: ${{github.workspace}}/build
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{env.BUILD_TYPE}}

    - name: Upload LastTest.log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: LastTest-log
        path: ${{github.workspace}}/build/Testing/Temporary/LastTest.log
